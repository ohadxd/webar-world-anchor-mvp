<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebAR World Anchor MVP</title>
  <link rel="icon" href="data:," />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050816;
      color: white;
    }

    #infoPanel {
      position: fixed;
      top: env(safe-area-inset-top, 12px);
      left: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      padding: 14px 16px;
      backdrop-filter: blur(8px);
      line-height: 1.35;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    #title {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 4px;
    }

    #status {
      font-size: 14px;
      opacity: 0.94;
    }

    #controls {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      z-index: 30;
      display: grid;
      gap: 10px;
    }

    button.action {
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 17px;
      font-weight: 800;
      color: #06111f;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    button.action:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      box-shadow: none;
    }

    button.secondary {
      background: rgba(255,255,255,0.16);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: none;
    }

    #progressWrap {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
      display: none;
    }

    #progress {
      width: 0%;
      height: 100%;
      background: white;
      transition: width 0.08s linear;
    }

    #passportPage {
      position: fixed;
      inset: 10vh 8vw;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      pointer-events: none;
    }

    .page {
      width: min(82vw, 420px);
      min-height: 360px;
      border-radius: 24px;
      background: linear-gradient(135deg, #f5e7bc, #fff7d7);
      color: #122;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
      border: 2px solid rgba(90, 63, 24, 0.25);
      transform-origin: left center;
      animation: flipPage 1.1s ease-in-out forwards;
      text-align: center;
    }

    .stamp {
      margin: 26px auto 0;
      width: 140px;
      height: 140px;
      border: 8px solid #118a37;
      border-radius: 50%;
      color: #118a37;
      display: grid;
      place-items: center;
      font-weight: 900;
      transform: rotate(-12deg);
      font-size: 20px;
    }

    @keyframes flipPage {
      0% { transform: rotateY(0deg); }
      55% { transform: rotateY(-110deg); }
      100% { transform: rotateY(-180deg); opacity: 0; }
    }

    .hidden {
      display: none !important;
    }

    a {
      color: #fff;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    #xrOverlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: transparent;
      pointer-events: none;
    }

    #infoPanel,
    #controls,
    #debugPanel {
      pointer-events: auto;
    }

    #debugPanel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 248px);
      z-index: 70;
      display: none;
      max-height: 34vh;
      overflow: auto;
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Consolas, monospace;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 10px;
      padding: 10px;
      color: #d9f99d;
    }

    #debugPanel.visible {
      display: block;
    }

    #debugPanel strong {
      display: block;
      color: white;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div id="xrOverlay">
    <div id="infoPanel">
      <div id="title">משימת AR: עגינה לתחנת החלל</div>
      <div id="status">
        לחץ על Start AR ואשר מצלמה. אחרי שהמצלמה נפתחת, טען את תחנת החלל 2 מטר קדימה.
      </div>
    </div>

    <div id="controls">
      <div id="progressWrap"><div id="progress"></div></div>
      <button id="startArBtn" class="action">Start AR</button>
      <button id="placeBtn" class="action">טען תחנת חלל 2 מטר קדימה</button>
      <button id="resetBtn" class="action secondary">איפוס משימה</button>
    </div>

    <div id="debugPanel" aria-live="polite">
      <strong>AR debug</strong>
      <div id="debugLog"></div>
    </div>

    <div id="passportPage">
      <div class="page">
        <h1>העגינה הושלמה</h1>
        <p>הגעת לתחנת החלל וקיבלת חותמת בדרכון.</p>
        <div class="stamp">הושלם</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const statusEl = document.getElementById("status");
    const startArBtn = document.getElementById("startArBtn");
    const placeBtn = document.getElementById("placeBtn");
    const resetBtn = document.getElementById("resetBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressEl = document.getElementById("progress");
    const passportPage = document.getElementById("passportPage");
    const xrOverlay = document.getElementById("xrOverlay");
    const debugPanel = document.getElementById("debugPanel");
    const debugLogEl = document.getElementById("debugLog");

    const debugEnabled = new URLSearchParams(location.search).has("debug");
    const debugLines = [];
    const maxDebugLines = 80;

    let camera, scene, renderer;
    let station = null;
    let stationPlaced = false;
    let completed = false;
    let holdTimer = 0;
    let arSupported = false;
    let loggedFirstArFrame = false;
    const clock = new THREE.Clock();

    const MODEL_URL = "./models/iss.glb";
    const TARGET_MODEL_SIZE_METERS = 1.25;

    const TRIGGER_DISTANCE_METERS = 0.75;
    const HOLD_SECONDS = 1.35;

    if (debugEnabled) {
      debugPanel.classList.add("visible");
    }

    window.addEventListener("error", (event) => {
      debugLog("window error", {
        message: event.message,
        source: event.filename,
        line: event.lineno,
        column: event.colno,
        error: errorToPlain(event.error)
      });
    });

    window.addEventListener("unhandledrejection", (event) => {
      debugLog("unhandled rejection", errorToPlain(event.reason));
    });

    init();

    function init() {
      debugLog("init", {
        href: location.href,
        secure: window.isSecureContext,
        hasXR: "xr" in navigator,
        userAgent: navigator.userAgent,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        dpr: window.devicePixelRatio
      });

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 80);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType("local");
      document.body.appendChild(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x404040, 2.2);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.5);
      dir.position.set(2, 4, 3);
      scene.add(dir);

      addStartARButton();

      window.addEventListener("resize", onWindowResize);
      startArBtn.addEventListener("click", onStartArClick);
      startArBtn.disabled = true;
      placeBtn.addEventListener("click", placeStationTwoMetersAhead);
      placeBtn.disabled = true;
      resetBtn.addEventListener("click", resetMission);

      renderer.setAnimationLoop(render);
    }

    function addStartARButton() {
      if (!window.isSecureContext) {
        statusEl.innerHTML = "WebXR דורש HTTPS או localhost. אם הדף פתוח ב־HTTP רגיל, הדפדפן לא יפתח מצלמה.";
        debugLog("blocked: insecure context");
        return;
      }

      if (!("xr" in navigator)) {
        statusEl.innerHTML = "המכשיר או הדפדפן לא חושף WebXR. נסה Chrome באנדרואיד עם Google Play Services for AR.";
        debugLog("blocked: navigator.xr missing");
        return;
      }

      navigator.xr.isSessionSupported("immersive-ar")
        .then((supported) => {
          arSupported = supported;
          debugLog("isSessionSupported immersive-ar", { supported });
          if (!supported) {
            statusEl.textContent = "AR לא נתמך במכשיר הזה. נדרש Chrome באנדרואיד עם ARCore פעיל.";
            return;
          }
          startArBtn.disabled = false;
          statusEl.textContent = "מוכן. לחץ Start AR ואשר מצלמה.";
        })
        .catch((error) => {
          debugLog("isSessionSupported failed", errorToPlain(error));
          statusEl.textContent = "לא הצלחתי לבדוק תמיכת AR. ודא שהדף רץ ב־HTTPS ונסה שוב.";
        });

      renderer.xr.addEventListener("sessionstart", () => {
        loggedFirstArFrame = false;
        startArBtn.textContent = "Exit AR";
        startArBtn.disabled = false;
        placeBtn.disabled = false;
        debugLog("renderer.xr sessionstart");
        statusEl.textContent = "המצלמה פעילה. לחץ על טעינת תחנת החלל כדי להציב אותה בחדר.";
      });

      renderer.xr.addEventListener("sessionend", () => {
        startArBtn.textContent = "Start AR";
        startArBtn.disabled = !arSupported;
        placeBtn.disabled = true;
        stationPlaced = false;
        holdTimer = 0;
        loggedFirstArFrame = false;
        progressEl.style.width = "0%";
        progressWrap.style.display = "none";
        removeStation();
        debugLog("renderer.xr sessionend");
        if (!completed) {
          statusEl.textContent = "יצאת מ־AR. לחץ Start AR כדי לפתוח שוב את המצלמה.";
        }
      });
    }

    async function onStartArClick() {
      if (renderer.xr.isPresenting) {
        const session = renderer.xr.getSession();
        debugLog("ending AR session");
        try {
          await session?.end();
        } catch (error) {
          debugLog("session.end failed", errorToPlain(error));
        }
        return;
      }

      startArBtn.disabled = true;
      statusEl.textContent = "מבקש הרשאת מצלמה וכניסה ל־AR...";

      const sessionInit = {
        optionalFeatures: ["dom-overlay"],
        domOverlay: { root: xrOverlay }
      };

      debugLog("requestSession immersive-ar", sessionInit);

      try {
        const session = await navigator.xr.requestSession("immersive-ar", sessionInit);
        debugLog("requestSession resolved");
        session.addEventListener("end", () => debugLog("native XRSession end"));
        await renderer.xr.setSession(session);
        debugLog("renderer.xr.setSession resolved");
      } catch (error) {
        const plainError = errorToPlain(error);
        debugLog("requestSession failed", plainError);
        startArBtn.disabled = false;
        statusEl.textContent = `AR לא נפתח: ${plainError.name || "Error"} - ${plainError.message || "אין פירוט שגיאה"}`;
      }
    }

    function placeStationTwoMetersAhead() {
      if (completed) return;

      if (!renderer.xr.isPresenting) {
        statusEl.textContent = "קודם לחץ Start AR ואשר הרשאת מצלמה.";
        return;
      }

      removeStation();

      const camPos = new THREE.Vector3();
      const forward = new THREE.Vector3();
      getCameraPose(camPos, forward);

      // כדי שהמודל יהיה קדימה בחדר ולא עף למעלה/למטה בגלל הטיית הטלפון:
      forward.y = 0;
      if (forward.lengthSq() < 0.0001) {
        forward.set(0, 0, -1);
      } else {
        forward.normalize();
      }

      const targetPos = camPos.clone().add(forward.multiplyScalar(2.0));
      targetPos.y = camPos.y - 0.15;

      station = new THREE.Group();
      station.position.copy(targetPos);
      stationPlaced = true;
      scene.add(station);

      addWaypointRing(station);
      loadModelInto(station);

      statusEl.textContent = "מציב תחנת חלל 2 מטר קדימה וטוען מודל...";
      progressWrap.style.display = "block";
      progressEl.style.width = "0%";
      holdTimer = 0;
    }

    function loadModelInto(parent) {
      const loader = new GLTFLoader();
      debugLog("loading model", { url: MODEL_URL });

      loader.load(
        MODEL_URL,
        (gltf) => {
          debugLog("model loaded");
          const model = gltf.scene;
          fitModelToTargetSize(model, TARGET_MODEL_SIZE_METERS);
          parent.add(model);

          addFloatingLabel(parent, "ISS TARGET");
          statusEl.textContent = "תחנת החלל מוכנה. לך אל טבעת העגינה עד שהמד יתמלא.";
        },
        (event) => {
          if (!event.lengthComputable) {
            statusEl.textContent = "טוען מודל ISS...";
            return;
          }
          const percent = Math.round((event.loaded / event.total) * 100);
          statusEl.textContent = `טוען מודל ISS... ${percent}%`;
        },
        (error) => {
          console.error("Failed to load GLB model", error);
          debugLog("model load failed", errorToPlain(error));
          // fallback אם GLB לא נטען
          createFallbackSpaceStation(parent);
          addFloatingLabel(parent, "ISS TARGET");
          statusEl.textContent = "ה־GLB המקומי לא נטען, אז נטען מודל בדיקה פנימי. בדוק שהקובץ models/iss.glb קיים בפריסה.";
        }
      );
    }

    function fitModelToTargetSize(model, targetSizeMeters) {
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        model.scale.setScalar(targetSizeMeters / maxAxis);
      }

      const centeredBox = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      centeredBox.getCenter(center);
      model.position.sub(center);
    }

    function createFallbackSpaceStation(parent) {
      const material = new THREE.MeshStandardMaterial({ color: 0xdde8ff, metalness: 0.25, roughness: 0.35 });
      const dark = new THREE.MeshStandardMaterial({ color: 0x111827, metalness: 0.1, roughness: 0.5 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.22, 0.22), material);
      parent.add(body);

      const panel1 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.03, 0.55), dark);
      panel1.position.x = -0.95;
      parent.add(panel1);

      const panel2 = panel1.clone();
      panel2.position.x = 0.95;
      parent.add(panel2);

      const module1 = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.45, 24), material);
      module1.rotation.z = Math.PI / 2;
      module1.position.z = 0.34;
      parent.add(module1);

      const module2 = module1.clone();
      module2.position.z = -0.34;
      parent.add(module2);
    }

    function addWaypointRing(parent) {
      const ringGeo = new THREE.TorusGeometry(0.65, 0.025, 12, 80);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x4fd1ff });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = -0.55;
      parent.add(ring);

      const sphereGeo = new THREE.SphereGeometry(0.07, 24, 24);
      const sphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const sphere = new THREE.Mesh(sphereGeo, sphereMat);
      sphere.position.y = 0.75;
      parent.add(sphere);
    }

    function addFloatingLabel(parent, text) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(0,0,0,0.70)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 4;
      ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);
      ctx.fillStyle = "white";
      ctx.font = "bold 42px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.9, 0.22, 1);
      sprite.position.set(0, 0.95, 0);
      parent.add(sprite);
    }

    function render() {
      const delta = clock.getDelta();

      if (renderer.xr.isPresenting && !loggedFirstArFrame) {
        loggedFirstArFrame = true;
        debugLog("first AR render frame");
      }

      if (stationPlaced && station && !completed && renderer.xr.isPresenting) {
        checkDistanceTrigger(delta);
        station.rotation.y += 0.006;
      }

      renderer.render(scene, camera);
    }

    function checkDistanceTrigger(delta) {
      const camPos = new THREE.Vector3();
      const forward = new THREE.Vector3();
      getCameraPose(camPos, forward);

      const distance = camPos.distanceTo(station.position);

      if (distance < TRIGGER_DISTANCE_METERS) {
        holdTimer += delta;
        const percent = Math.min(100, (holdTimer / HOLD_SECONDS) * 100);
        progressEl.style.width = `${percent}%`;
        statusEl.textContent = `אתה באזור העגינה. הישאר רגע... ${Math.round(percent)}%`;

        if (holdTimer >= HOLD_SECONDS) {
          completeStation();
        }
      } else {
        holdTimer = 0;
        progressEl.style.width = "0%";
        statusEl.textContent = `מרחק מהתחנה: ${distance.toFixed(2)} מטר. התקרב לטבעת העגינה.`;
      }
    }

    function getCameraPose(position, direction) {
      const activeCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;
      activeCamera.updateMatrixWorld(true);
      activeCamera.getWorldPosition(position);
      activeCamera.getWorldDirection(direction);
    }

    function completeStation() {
      completed = true;
      localStorage.setItem("passport_station_iss_docking", "completed");

      statusEl.textContent = "העגינה הושלמה. חותמת נוספה לדרכון.";
      progressEl.style.width = "100%";
      passportPage.style.display = "flex";

      // כאן תחבר לדרכון האמיתי:
      // window.parent?.postMessage({ type: "AR_STATION_COMPLETED", stationId: "iss-docking" }, "*");
      // location.href = "/passport/YOUR_SESSION_ID?completed=iss-docking";

      setTimeout(() => {
        passportPage.style.display = "none";
      }, 1500);
    }

    function resetMission() {
      completed = false;
      holdTimer = 0;
      stationPlaced = false;
      localStorage.removeItem("passport_station_iss_docking");
      progressEl.style.width = "0%";
      progressWrap.style.display = "none";
      passportPage.style.display = "none";
      removeStation();
      statusEl.textContent = "אופס. המשימה אופסה. טען שוב תחנת חלל 2 מטר קדימה.";
    }

    function removeStation() {
      if (!station) return;
      station.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose?.();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose?.());
          else obj.material.dispose?.();
        }
      });
      scene.remove(station);
      station = null;
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function debugLog(message, data = null) {
      if (!debugEnabled) {
        return;
      }

      const time = new Date().toLocaleTimeString("en-GB", { hour12: false });
      const details = data === null ? "" : ` ${formatDebugData(data)}`;
      debugLines.push(`[${time}] ${message}${details}`);

      if (debugLines.length > maxDebugLines) {
        debugLines.shift();
      }

      debugLogEl.textContent = debugLines.join("\n");
      debugPanel.scrollTop = debugPanel.scrollHeight;
      console.info("[AR debug]", message, data);
    }

    function formatDebugData(data) {
      if (typeof data === "string") {
        return data;
      }

      try {
        return JSON.stringify(data, null, 2);
      } catch {
        return String(data);
      }
    }

    function errorToPlain(error) {
      if (!error) {
        return null;
      }

      if (error instanceof Error) {
        return {
          name: error.name,
          message: error.message,
          stack: error.stack
        };
      }

      if (typeof error === "object") {
        return {
          name: error.name,
          message: error.message,
          code: error.code
        };
      }

      return { message: String(error) };
    }
  </script>
</body>
</html>
