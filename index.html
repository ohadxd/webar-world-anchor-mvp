<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebXR AR Model Loader</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
      --bg: #071018;
      --panel: rgba(8, 17, 27, 0.78);
      --panel-solid: #101d29;
      --border: rgba(255, 255, 255, 0.2);
      --text: #f6f9fc;
      --muted: #c1cedb;
      --button: #f6f9fc;
      --button-text: #071018;
      --danger: #ff5f57;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    #xrOverlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: transparent;
      pointer-events: none;
    }

    #topBar,
    #bottomBar,
    #fallbackPanel {
      pointer-events: auto;
    }

    #topBar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      align-items: start;
    }

    #exitBtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.64);
      color: white;
      font-size: 26px;
      line-height: 1;
      font-weight: 700;
      display: none;
      place-items: center;
      padding: 0 0 3px;
    }

    body.in-ar #exitBtn {
      display: grid;
    }

    #statusPanel {
      min-height: 44px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    #title {
      font-weight: 850;
      font-size: 17px;
      margin-bottom: 4px;
    }

    #status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    #bottomBar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(16px, env(safe-area-inset-bottom));
      display: grid;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 50px;
      padding: 13px 16px;
      font: inherit;
      font-size: 16px;
      font-weight: 850;
      color: var(--button-text);
      background: var(--button);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    button.secondary {
      color: white;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.45;
      box-shadow: none;
    }

    body.in-ar #startBtn,
    body:not(.in-ar) #placeBtn {
      display: none;
    }

    #fallbackPanel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(max(16px, env(safe-area-inset-bottom)) + 70px);
      display: none;
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 28vh;
      overflow: auto;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      color: #d6e8ff;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    #fallbackPanel.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div id="xrOverlay">
    <div id="topBar">
      <button id="exitBtn" type="button" aria-label="יציאה מ־AR">×</button>
      <div id="statusPanel">
        <div id="title">טעינת מודל ב־AR</div>
        <div id="status">בודק תמיכת AR במכשיר...</div>
      </div>
    </div>

    <div id="fallbackPanel"></div>

    <div id="bottomBar">
      <button id="startBtn" type="button" disabled>פתח מצלמת AR</button>
      <button id="placeBtn" type="button" disabled>טען מודל 2 מטר קדימה</button>
      <button id="resetBtn" class="secondary" type="button">איפוס מודל</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const xrOverlay = document.getElementById("xrOverlay");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const placeBtn = document.getElementById("placeBtn");
    const exitBtn = document.getElementById("exitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fallbackPanel = document.getElementById("fallbackPanel");

    const MODEL_URL = "./models/iss.glb";
    const TARGET_MODEL_SIZE_METERS = 1.25;

    let scene;
    let camera;
    let renderer;
    let station = null;
    let arSupported = false;
    let overlayActive = false;
    let pendingAutoPlaceFrames = 0;

    init();

    async function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 80);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType("local");
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x445566, 2.4));

      const dir = new THREE.DirectionalLight(0xffffff, 1.4);
      dir.position.set(2, 4, 3);
      scene.add(dir);

      window.addEventListener("resize", onWindowResize);
      startBtn.addEventListener("click", startAR);
      placeBtn.addEventListener("click", placeModelTwoMetersAhead);
      exitBtn.addEventListener("click", exitAR);
      resetBtn.addEventListener("click", resetModel);

      renderer.xr.addEventListener("sessionstart", onSessionStart);
      renderer.xr.addEventListener("sessionend", onSessionEnd);
      renderer.setAnimationLoop(render);

      await checkSupport();
    }

    async function checkSupport() {
      if (!window.isSecureContext) {
        setStatus("WebXR דורש HTTPS או localhost. הדף הזה לא יכול לפתוח מצלמת AR בלי secure context.");
        return;
      }

      if (!("xr" in navigator)) {
        setStatus("הדפדפן לא חושף navigator.xr. באנדרואיד צריך Chrome מלא עם Google Play Services for AR.");
        return;
      }

      try {
        arSupported = await navigator.xr.isSessionSupported("immersive-ar");
      } catch (error) {
        setStatus(`בדיקת AR נכשלה: ${formatError(error)}`);
        return;
      }

      if (!arSupported) {
        setStatus("המכשיר/דפדפן לא מדווחים על תמיכת immersive-ar.");
        return;
      }

      startBtn.disabled = false;
      setStatus("מוכן. לחץ “פתח מצלמת AR”. בתוך המצלמה יהיה X וכפתור טעינת מודל.");
    }

    async function startAR() {
      startBtn.disabled = true;
      setStatus("פותח מצלמת AR...");

      try {
        const session = await requestSessionWithOverlayFallback();
        overlayActive = Boolean(session.domOverlayState);
        await renderer.xr.setSession(session);

        if (!overlayActive) {
          pendingAutoPlaceFrames = 24;
          setStatus("AR נפתח בלי DOM overlay. המודל ייטען אוטומטית 2 מטר קדימה; ליציאה השתמש בכפתור הדפדפן.");
        }
      } catch (error) {
        startBtn.disabled = false;
        setStatus(`AR לא נפתח: ${formatError(error)}`);
        logDetails({
          error: plainError(error),
          userAgent: navigator.userAgent
        });
      }
    }

    async function requestSessionWithOverlayFallback() {
      const overlaySessionInit = {
        optionalFeatures: ["dom-overlay"],
        domOverlay: { root: xrOverlay }
      };

      try {
        return await navigator.xr.requestSession("immersive-ar", overlaySessionInit);
      } catch (error) {
        logDetails({
          overlaySessionFailed: plainError(error),
          retrying: "navigator.xr.requestSession('immersive-ar')"
        });
        return navigator.xr.requestSession("immersive-ar");
      }
    }

    function onSessionStart() {
      document.body.classList.add("in-ar");
      placeBtn.disabled = false;
      startBtn.disabled = true;
      setStatus(overlayActive
        ? "המצלמה פתוחה. לחץ “טען מודל 2 מטר קדימה”, או X כדי לצאת."
        : "המצלמה פתוחה. אין DOM overlay במכשיר הזה, לכן המודל ייטען אוטומטית.");
    }

    function onSessionEnd() {
      document.body.classList.remove("in-ar");
      placeBtn.disabled = true;
      startBtn.disabled = !arSupported;
      overlayActive = false;
      pendingAutoPlaceFrames = 0;
      setStatus("יצאת מ־AR. אפשר לפתוח שוב את המצלמה.");
    }

    async function exitAR() {
      const session = renderer.xr.getSession();
      if (!session) return;

      try {
        await session.end();
      } catch (error) {
        setStatus(`לא הצלחתי לצאת מ־AR: ${formatError(error)}`);
      }
    }

    function placeModelTwoMetersAhead() {
      if (!renderer.xr.isPresenting) {
        setStatus("קודם צריך לפתוח מצלמת AR.");
        return;
      }

      resetModel();

      const camPos = new THREE.Vector3();
      const forward = new THREE.Vector3();
      getCameraPose(camPos, forward);

      forward.y = 0;
      if (forward.lengthSq() < 0.0001) {
        forward.set(0, 0, -1);
      } else {
        forward.normalize();
      }

      const targetPos = camPos.clone().add(forward.multiplyScalar(2));
      targetPos.y = camPos.y - 0.15;

      station = new THREE.Group();
      station.position.copy(targetPos);
      scene.add(station);

      addWaypointRing(station);
      loadModel(station);
      setStatus("טוען מודל 2 מטר קדימה...");
    }

    function loadModel(parent) {
      const loader = new GLTFLoader();

      loader.load(
        MODEL_URL,
        (gltf) => {
          const model = gltf.scene;
          fitModelToTargetSize(model, TARGET_MODEL_SIZE_METERS);
          parent.add(model);
          addFloatingLabel(parent, "2m TARGET");
          setStatus("המודל נטען. אפשר לזוז אליו במרחב.");
        },
        (event) => {
          if (!event.lengthComputable) {
            setStatus("טוען מודל...");
            return;
          }

          setStatus(`טוען מודל... ${Math.round((event.loaded / event.total) * 100)}%`);
        },
        (error) => {
          createFallbackModel(parent);
          addFloatingLabel(parent, "2m TARGET");
          setStatus(`ה־GLB לא נטען, אז נטען מודל fallback. ${formatError(error)}`);
        }
      );
    }

    function addWaypointRing(parent) {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.65, 0.025, 12, 80),
        new THREE.MeshBasicMaterial({ color: 0x4fd1ff })
      );
      ring.rotation.x = Math.PI / 2;
      ring.position.y = -0.55;
      parent.add(ring);

      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.07, 24, 24),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      dot.position.y = 0.75;
      parent.add(dot);
    }

    function createFallbackModel(parent) {
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xdde8ff, metalness: 0.2, roughness: 0.38 });
      const panelMat = new THREE.MeshStandardMaterial({ color: 0x16233f, metalness: 0.1, roughness: 0.5 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.22, 0.22), bodyMat);
      parent.add(body);

      const leftPanel = new THREE.Mesh(new THREE.BoxGeometry(1.25, 0.03, 0.48), panelMat);
      leftPanel.position.x = -0.92;
      parent.add(leftPanel);

      const rightPanel = leftPanel.clone();
      rightPanel.position.x = 0.92;
      parent.add(rightPanel);

      const module = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.5, 24), bodyMat);
      module.rotation.z = Math.PI / 2;
      module.position.z = 0.34;
      parent.add(module);
    }

    function addFloatingLabel(parent, text) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 4;
      ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);
      ctx.fillStyle = "white";
      ctx.font = "bold 42px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
      sprite.scale.set(0.9, 0.22, 1);
      sprite.position.y = 0.95;
      parent.add(sprite);
    }

    function fitModelToTargetSize(model, targetSizeMeters) {
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        model.scale.setScalar(targetSizeMeters / maxAxis);
      }

      const centeredBox = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      centeredBox.getCenter(center);
      model.position.sub(center);
    }

    function resetModel() {
      if (!station) return;

      station.traverse((obj) => {
        obj.geometry?.dispose?.();

        if (obj.material) {
          const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
          materials.forEach((material) => {
            material.map?.dispose?.();
            material.dispose?.();
          });
        }
      });

      scene.remove(station);
      station = null;
    }

    function render() {
      if (renderer.xr.isPresenting && pendingAutoPlaceFrames > 0) {
        pendingAutoPlaceFrames -= 1;

        if (pendingAutoPlaceFrames === 0 && !station) {
          placeModelTwoMetersAhead();
        }
      }

      if (station) {
        station.rotation.y += 0.006;
      }

      renderer.render(scene, camera);
    }

    function getCameraPose(position, direction) {
      const xrCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;
      xrCamera.updateMatrixWorld(true);
      xrCamera.getWorldPosition(position);
      xrCamera.getWorldDirection(direction);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function logDetails(data) {
      fallbackPanel.classList.add("visible");
      fallbackPanel.textContent = JSON.stringify(data, null, 2);
    }

    function formatError(error) {
      const plain = plainError(error);
      return `${plain.name || "Error"}: ${plain.message || "אין פירוט שגיאה"}`;
    }

    function plainError(error) {
      if (!error) {
        return { name: null, message: null };
      }

      return {
        name: error.name || null,
        message: error.message || String(error)
      };
    }
  </script>
</body>
</html>
